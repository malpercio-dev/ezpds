<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Identity Wallet — seal your identity (mock)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --serif:'Libre Caslon Display',Georgia,serif;
    --sans:'Public Sans',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --gold:oklch(0.46 0.105 62); --gold-deep:oklch(0.38 0.09 60); --seal-pale:oklch(0.93 0.05 80);
    --aubergine:oklch(0.34 0.10 330);
    --ink:oklch(0.23 0.012 60); --ink-soft:oklch(0.31 0.012 60); --muted:oklch(0.40 0.012 60);
    --parchment:oklch(0.975 0.004 75); --sunk:oklch(0.955 0.005 75);
    --hairline:oklch(0.90 0.004 75); --on:oklch(0.99 0.005 80);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:oklch(0.95 0.006 75);font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;padding:32px 16px;min-height:100vh}
  .device{width:414px;height:862px;background:#fff;border-radius:46px;border:1px solid var(--hairline);box-shadow:0 1px 0 oklch(0.90 0.004 75),0 24px 60px oklch(0.23 0.012 60/0.10);overflow:hidden;display:flex;flex-direction:column}
  .statusbar{height:46px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 7px;font-size:14px;font-weight:600}
  .statusbar .icons{display:flex;align-items:center;gap:6px}
  .battery{width:24px;height:12px;border:1.3px solid var(--ink);border-radius:3px;position:relative;opacity:.9}
  .battery::after{content:"";position:absolute;top:2px;left:1.5px;bottom:2px;width:70%;background:var(--ink);border-radius:1px}
  .battery::before{content:"";position:absolute;right:-3px;top:3.5px;height:5px;width:2px;background:var(--ink);border-radius:0 1px 1px 0}
  .appbar{height:50px;flex-shrink:0;display:flex;align-items:center;padding:0 12px}
  .back{display:inline-flex;align-items:center;gap:3px;color:var(--aubergine);background:none;border:none;font-family:var(--sans);font-size:16px;font-weight:500;cursor:pointer;padding:8px 6px;border-radius:8px}
  .dots{flex:1;display:flex;align-items:center;justify-content:center;gap:7px}
  .dots i{width:7px;height:7px;border-radius:9999px;background:var(--hairline)}
  .dots i.on{background:var(--gold);width:20px;border-radius:9999px}
  .appbar .spacer{width:64px;flex-shrink:0}
  .content{flex:1;overflow-y:auto;padding:8px 28px 28px;display:flex;flex-direction:column;align-items:center;text-align:center}
  .overline{font-size:12.5px;font-weight:600;letter-spacing:.04em;color:var(--gold-deep);margin-bottom:12px}
  h1{font-family:var(--serif);font-weight:400;font-size:32px;line-height:1.1;margin-bottom:12px}
  .sub{font-size:15.5px;line-height:1.55;color:var(--ink-soft);max-width:30ch;margin-bottom:8px}
  .handle-chip{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:13.5px;color:var(--ink);background:var(--parchment);border:1px solid var(--hairline);padding:7px 13px;border-radius:9999px;margin-top:14px;transition:opacity .3s ease}
  .handle-chip svg{color:var(--gold-deep)}
  /* seal */
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;width:100%;padding:14px 0}
  .sealbtn{position:relative;width:158px;height:158px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-user-select:none;user-select:none}
  .sealbtn::after{content:"";position:absolute;width:158px;height:158px;border-radius:9999px;border:2px solid var(--gold);opacity:0}
  .wax{position:relative;width:140px;height:140px;border-radius:9999px;background:var(--sunk);box-shadow:inset 0 0 0 2px oklch(0.86 0.07 80);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:box-shadow .45s ease}
  .goldfill{position:absolute;inset:0;border-radius:9999px;background:var(--gold);transform:scale(0);transition:transform .12s linear}
  .ml{position:relative;z-index:1;font-family:var(--serif);font-size:58px;line-height:1;color:oklch(0.62 0.10 72);transition:color .4s ease}
  .press{font-size:13.5px;font-weight:500;color:var(--muted);transition:opacity .3s ease}
  /* sealed state */
  .sealed .goldfill{transform:scale(1.02)}
  .sealed .wax{box-shadow:inset 0 0 0 2px oklch(0.99 0.05 80/0.4),inset 0 -4px 10px oklch(0.2 0.05 60/0.25);animation:stamp .5s cubic-bezier(.34,1.5,.5,1)}
  .sealed .ml{color:var(--on)}
  .sealed .sealbtn::after{animation:ping .7s cubic-bezier(.22,1,.36,1)}
  .sealed .press,.sealed .handle-chip{opacity:0}
  @keyframes stamp{0%{transform:scale(1.13)}60%{transform:scale(.975)}100%{transform:scale(1)}}
  @keyframes ping{0%{transform:scale(.92);opacity:.5}100%{transform:scale(1.32);opacity:0}}
  /* reveal-after */
  .after{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;opacity:0;transform:translateY(10px);transition:opacity .45s ease .15s,transform .45s cubic-bezier(.22,1,.36,1) .15s;pointer-events:none}
  .sealed .after{opacity:1;transform:none;pointer-events:auto}
  .did-chip{display:flex;flex-direction:column;gap:5px;background:var(--parchment);border:1px solid var(--hairline);border-radius:13px;padding:13px 16px;width:100%}
  .did-chip .dl{font-size:12px;font-weight:600;color:var(--muted)}
  .did-chip .dv{font-family:var(--mono);font-size:13.5px;color:var(--ink);word-break:break-all;line-height:1.4}
  .sealed-by{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--gold-deep);font-weight:500}
  /* action */
  .actions{flex-shrink:0;padding:8px 24px 26px;width:100%}
  .cta{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:9px;background:var(--gold);color:var(--on);border:none;border-radius:12px;padding:16px;font-family:var(--sans);font-size:16px;font-weight:600;cursor:pointer;opacity:0;transform:translateY(8px);transition:opacity .4s ease .25s,transform .4s ease .25s,background .18s ease;pointer-events:none}
  .sealed .cta{opacity:1;transform:none;pointer-events:auto}
  .cta:hover{background:var(--gold-deep)}
  @media (prefers-reduced-motion: reduce){
    *{transition-duration:.01ms!important}
    .sealed .wax{animation:none}.sealed .sealbtn::after{animation:none}
    .after,.cta{transition:none}
  }
</style>
</head>
<body>
  <div class="device" role="group" aria-label="Identity Wallet seal your identity screen mock">

    <div class="statusbar">
      <span>9:41</span>
      <span class="icons" aria-hidden="true">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 4.2a10 10 0 0 1 14 0M3.4 6.8a6.4 6.4 0 0 1 9.2 0M8 9.6h.01" stroke-linecap="round"/></svg>
        <span class="battery"></span>
      </span>
    </div>

    <div class="appbar">
      <button class="back" aria-label="Back">
        <svg width="11" height="18" viewBox="0 0 11 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 1 2 9l7 8"/></svg>
        Back
      </button>
      <span class="dots" aria-hidden="true"><i></i><i></i><i class="on"></i><i></i><i></i></span>
      <span class="spacer"></span>
    </div>

    <div class="content" id="wrap">

      <p class="overline">New identity</p>
      <h1 id="headline">Seal your identity</h1>
      <p class="sub" id="sub">Press and hold your signet to mint your identity. Your device key becomes the one key that controls it &mdash; held only by you.</p>
      <span class="handle-chip" id="chip">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        malpercio.dev
      </span>

      <div class="stage">
        <button class="sealbtn" id="seal" aria-label="Press and hold to seal your identity">
          <span class="wax">
            <span class="goldfill" id="fill"></span>
            <span class="ml">J</span>
          </span>
        </button>
        <p class="press" id="press">Press and hold to seal</p>

        <div class="after" aria-live="polite">
          <div class="did-chip">
            <span class="dl">Your identity</span>
            <span class="dv">did:plc:k3yq2x9z7r4w8m1n</span>
          </div>
          <span class="sealed-by">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 11.5 2 2 4-4"/></svg>
            Sealed by your device key
          </span>
        </div>
      </div>

    </div>

    <div class="actions">
      <button class="cta" id="cta">
        Back up your recovery key
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </div>

  </div>

<script>
  var seal = document.getElementById('seal'), fill = document.getElementById('fill');
  var wrap = document.getElementById('wrap'), press = document.getElementById('press');
  var headline = document.getElementById('headline'), sub = document.getElementById('sub');
  var DURATION = 1600, raf = null, start = null, done = false;
  function frame(now){
    if(start === null) start = now;
    var p = Math.min(1, (now - start) / DURATION);
    fill.style.transform = 'scale(' + (p * 1.02) + ')';
    if(p >= 1){ complete(); return; }
    raf = requestAnimationFrame(frame);
  }
  function begin(e){
    if(done) return;
    e.preventDefault();
    press.textContent = 'Keep holding…';
    start = null; raf = requestAnimationFrame(frame);
  }
  function cancel(){
    if(done || raf === null) return;
    cancelAnimationFrame(raf); raf = null; start = null;
    fill.style.transition = 'transform .3s cubic-bezier(.22,1,.36,1)';
    fill.style.transform = 'scale(0)';
    press.textContent = 'Press and hold to seal';
    setTimeout(function(){ fill.style.transition = 'transform .12s linear'; }, 310);
  }
  function complete(){
    done = true; raf = null;
    fill.style.transform = 'scale(1.02)';
    headline.textContent = 'Identity sealed';
    sub.textContent = 'malpercio.dev is yours. Only your device key can change it — keep it safe.';
    wrap.classList.add('sealed');
  }
  seal.addEventListener('pointerdown', begin);
  seal.addEventListener('pointerup', cancel);
  seal.addEventListener('pointerleave', cancel);
  seal.addEventListener('pointercancel', cancel);
</script>
</body>
</html>
