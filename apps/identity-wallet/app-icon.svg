<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Obsign app icon — "the sealed credential": the app's own SealEmblem brand moment
    (gold wax seal holding the shield-check, src/lib/components/ui/SealEmblem.svelte)
    promoted to the home screen. Design rationale: DESIGN.md §6 (Brand Mark & App Icon).

    Source of truth for app-icon.png (the 1024x1024 render `cargo tauri icon` consumes —
    regenerated into the iOS asset catalog by ios-postinit Patch G).

    Drawn full-bleed on the square: iOS applies the squircle mask and (on iOS 26) the
    Liquid Glass material itself — no baked-in corner radius, no gloss. The two top-level
    groups (`layer-background` / `layer-glyph`) are Icon Composer seams if this is ever
    rebuilt as a layered .icon file.

    The seal outline is a deterministic gentle undulation (sin composition around
    r=298: 0.017·sin(9t+0.8) + 0.010·sin(4t+2.3) + 0.005·sin(13t+4.6)) — a pressed wax
    edge, calm on purpose: unmistakably a seal, never a coin (the Authenticity-Not-
    Currency rule) and never a splat. Colors are the Obsign tokens
    (apps/identity-wallet/src/lib/styles/tokens.css), OKLCH → sRGB:
      page      white → sunk parchment            #ffffff / #f2f0ec
      wax       oklch(0.54/0.47/0.37 ~0.1 ~62)    #9b5f0f / #844b03 / #613201
      emblem    on-color oklch(0.99 0.005 80)     #fefbf8
      ring      pale-seal highlight, 32% alpha    #fff9d6
    Matte and dry per the brief — the gradients are shallow, never metallic glint.
  -->
