      <stop offset="1" stop-color="#f2f0ec"/>
    </linearGradient>
    <linearGradient id="wax" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9b5f0f"/>
      <stop offset="0.55" stop-color="#844b03"/>
      <stop offset="1" stop-color="#613201"/>
    </linearGradient>
    <linearGradient id="waxshade" x1="0" y1="0" x2="0" y2="1">
