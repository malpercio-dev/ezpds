name: Admin Companion · TestFlight

# Thin caller: builds the admin-companion Tauri app (the operator console) and uploads
# it to TestFlight by delegating to the shared reusable workflow
# (ios-testflight-reusable.yml). The whole build/sign/upload body lives there; this file
# keeps only the per-app trigger filter and wires up admin-companion's own
# provisioning-profile secret (IOS_MOBILE_PROVISION_ADMIN, bound to its bundle id).
#
# One-time setup (App Store Connect app record, the admin provisioning profile +
# IOS_MOBILE_PROVISION_ADMIN secret): see docs/ios-cicd.md.

on:
  push:
    branches: [main]
    # Skip rebuilds for changes that cannot affect the app. The app's only
    # workspace-crate dependency is `crypto` (itself free of path deps), so
    # crates/pds, crates/repo-engine, and crates/common changes deliberately do
    # NOT trigger a rebuild. CI-enforced: `just ios-paths-check` (part of the
    # Linux gate) recomputes this list from `cargo metadata` and fails on any
    # drift — an unwatched app dependency or a re-widened entry alike.
    paths:
      - "apps/admin-companion/**"
      - "crates/crypto/**"
      # The [patch.crates-io] swift-rs fork is workspace-wide: it compiles this
      # app's plugin Swift too, even though it lives under identity-wallet.
      - "apps/identity-wallet/swift-rs-patch/**"
      - "Cargo.toml"
      - "Cargo.lock"
      # The build/upload delegate to `just admin-*`, so a recipe change can break the lane.
      - "justfile"
      # The shared iOS toolchain/patch scripts live in scripts/ios/ (per-app
      # scripts are thin wrappers). PDS-only scripts directly under scripts/
      # (bruno-parity, font-parity, ...) are deliberately excluded.
      - "scripts/ios/**"
      # The shared runner preamble (toolchain, cache, tauri-cli pin, brew shim).
      - ".github/actions/ios-setup/**"
      - "rust-toolchain.toml"
      - ".github/workflows/admin-testflight.yml"
      # The shared build/sign/upload body this caller delegates to.
      - ".github/workflows/ios-testflight-reusable.yml"
  workflow_dispatch:

# Public repo + signing secrets: this workflow must never run for pull_request
# events, so a fork PR cannot exfiltrate the Apple key. push + workflow_dispatch
# only — both are gated to collaborators with write access.
permissions:
  contents: read

concurrency:
  group: admin-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    uses: ./.github/workflows/ios-testflight-reusable.yml
    with:
      app: admin-companion
      recipe-prefix: admin
    secrets:
      # admin-companion signs with the profile bound to its own bundle id
      # (dev.malpercio.admincompanion), so its secret feeds the reusable workflow's
      # IOS_MOBILE_PROVISION. Every other signing secret is team-wide and maps 1:1.
      IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION_ADMIN }}
      IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
