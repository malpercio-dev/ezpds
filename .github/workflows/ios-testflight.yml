name: iOS · TestFlight

# Thin caller: builds the identity-wallet Tauri app and uploads it to TestFlight by
# delegating to the shared reusable workflow (ios-testflight-reusable.yml). The whole
# build/sign/upload body lives there; this file keeps only the per-app trigger filter
# and wires up identity-wallet's provisioning-profile secret.
#
# One-time setup (mirror, App Store Connect, secrets): see docs/ios-cicd.md.

on:
  push:
    branches: [main]
    # Skip iOS rebuilds for changes that cannot affect the app (pds-only code,
    # docs). The app's only workspace-crate dependency is `crypto` (itself free
    # of path deps), so crates/pds, crates/repo-engine, and crates/common changes
    # deliberately do NOT trigger a rebuild. CI-enforced: `just ios-paths-check`
    # (part of the Linux gate) recomputes this list from `cargo metadata` and
    # fails on any drift — an unwatched app dependency or a re-widened entry alike.
    paths:
      - "apps/identity-wallet/**"
      - "apps/admin-companion/vendor/tauri-plugin-sharesheet/**"
      - "crates/crypto/**"
      - "Cargo.toml"
      - "Cargo.lock"
      # The build/upload delegate to `just ios-*`, so a recipe change can break the lane.
      - "justfile"
      # The imported recipe files the root justfile pulls in (the iOS build recipes
      # live in just/ios.just); a broken import fails `just` at parse time.
      - "just/release.just"
      - "just/ios.just"
      # The shared iOS toolchain/patch scripts live in scripts/ios/ (per-app
      # scripts are thin wrappers). PDS-only scripts directly under scripts/
      # (bruno-parity, font-parity, ...) are deliberately excluded.
      - "scripts/ios/**"
      # The shared runner preamble (toolchain, cache, tauri-cli pin, brew shim).
      - ".github/actions/ios-setup/**"
      - "rust-toolchain.toml"
      - ".github/workflows/ios-testflight.yml"
      # The shared build/sign/upload body this caller delegates to.
      - ".github/workflows/ios-testflight-reusable.yml"
  workflow_dispatch:

# Public repo + signing secrets: this workflow must never run for pull_request
# events, so a fork PR cannot exfiltrate the Apple key. push + workflow_dispatch
# only — both are gated to collaborators with write access.
permissions:
  contents: read

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    uses: ./.github/workflows/ios-testflight-reusable.yml
    with:
      app: identity-wallet
      recipe-prefix: ios
    secrets:
      # identity-wallet signs with the profile bound to its own bundle id.
      IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
      IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
