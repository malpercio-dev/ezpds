name: iOS · PR check

# PR-time validation for the two Tauri iOS apps. The TestFlight lanes
# (ios-testflight.yml, admin-testflight.yml) run only on push to main — they hold
# signing secrets and must never run for pull_request — so without this workflow every
# iOS breakage (a tauri-cli change defeating the custom project template, a Rust
# compile error on aarch64-apple-ios, a broken frontend) is discovered post-merge,
# inside a signed release build. This lane needs NO secrets: it regenerates the Xcode
# project from the committed template (scripts/ios/project.yml, via bundle > iOS >
# template), runs postinit + ios-check (which fail loudly if the template did not
# apply), cross-compiles the app staticlib for the iOS device target, and runs the app's Rust
# unit tests on the macOS host target (the only CI lane that can compile these crates —
# the Linux ci-pds gate excludes them) — everything short of xcodebuild
# archiving/signing. It also runs the frontend type-check and unit tests, which the
# TestFlight lanes skip.

on:
  pull_request:
    branches: [main]
    # Mirror the union of the two TestFlight lanes' path filters. The apps' only
    # workspace-crate dependency is `crypto` (itself free of path deps), so
    # crates/pds, crates/repo-engine, and crates/common changes deliberately do NOT
    # run this lane. CI-enforced: `just ios-paths-check` (part of the Linux gate)
    # recomputes this list from `cargo metadata` and fails on any drift — an
    # unwatched app dependency or a re-widened entry alike.
    paths:
      - "apps/identity-wallet/**"
      - "apps/admin-companion/**"
      - "crates/crypto/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      # The imported recipe files the root justfile pulls in (the iOS build recipes
      # live in just/ios.just); a broken import fails `just` at parse time.
      - "just/release.just"
      - "just/ios.just"
      # The shared iOS toolchain/patch scripts live in scripts/ios/ (per-app
      # scripts are thin wrappers). PDS-only scripts directly under scripts/
      # (bruno-parity, font-parity, ...) are deliberately excluded.
      - "scripts/ios/**"
      # The shared runner preamble (toolchain, cache, tauri-cli pin, brew shim).
      - ".github/actions/ios-setup/**"
      - "rust-toolchain.toml"
      - ".github/workflows/ios-pr-check.yml"
  workflow_dispatch:

# Read-only: no signing, no upload, no secrets anywhere in this workflow.
permissions:
  contents: read

concurrency:
  group: ios-pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend check (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app: [identity-wallet, admin-companion]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          # Exact pin — keep in lockstep with "packageManager" in apps/*/package.json
          # and the other workflows, so --frozen-lockfile can never fail on a pnpm
          # major/minor lockfile-format difference between local and CI.
          version: 9.15.9

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          # Cache the pnpm store (keyed by the lockfile hash). pnpm is already on PATH
          # from the action-setup step above, which setup-node's `cache: pnpm` requires.
          cache: pnpm
          cache-dependency-path: apps/${{ matrix.app }}/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: apps/${{ matrix.app }}
        run: pnpm install --frozen-lockfile

      - name: Type-check (svelte-check)
        working-directory: apps/${{ matrix.app }}
        run: pnpm run check

      - name: Unit tests (vitest)
        # Both apps carry a vitest suite; --if-present keeps the gate tolerant of a
        # future app scaffold that hasn't grown a test script yet.
        working-directory: apps/${{ matrix.app }}
        run: pnpm run --if-present test

  ios-compile:
    name: iOS compile (${{ matrix.app }})
    # Same runner as the TestFlight lanes (Xcode 26 / iOS 26 SDK), so a runner-image or
    # SDK problem surfaces here on a PR instead of post-merge in the release lane.
    runs-on: macos-26
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: identity-wallet
            recipe: ios
          - app: admin-companion
            recipe: admin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # pnpm + node + frontend deps, Rust iOS target, warm rust-cache (restored from the
      # app's TestFlight lane's main-branch seed under the same ios-<app> shared-key),
      # tauri-cli pin, and the arm64 brew shim — shared with the TestFlight lanes.
      - name: iOS toolchain setup
        uses: ./.github/actions/ios-setup
        with:
          app: ${{ matrix.app }}

      # gen/apple is gitignored — regenerate it. `cargo tauri ios init` renders the
      # committed scripts/ios/project.yml template into gen/apple/project.yml (the
      # `template` path in tauri.conf.json is cwd-relative, hence working-directory).
      # Postinit then checks the swift-rs fork, installs the app icon, and runs the
      # full ios-check — the template-seam gate: it fails loudly if the rendered
      # project is missing any workaround.
      - name: Generate the Xcode project
        working-directory: apps/${{ matrix.app }}
        run: cargo tauri ios init

      - name: Finish + verify the generated project (postinit)
        run: just ${{ matrix.recipe }}-postinit

      - name: Build frontend + cross-compile staticlib (aarch64-apple-ios)
        run: just ${{ matrix.recipe }}-pr-check
