name: CI

# The Linux half of CI — the PDS test gate (fmt, lock-check, clippy, test, audit, deny) via
# `just ci-pds`, plus the stdio MCP conformance suite (tools/mcp), which reuses the `pds`
# binary this gate already builds. Replaces the retired tangled spindle workflows
# (pr/staging/release.yaml).
#
# Deploys are now **native Railway GitHub integrations** — Railway connects to this repo
# and builds the Dockerfile itself, so there is no `railway up` and no Railway token here:
#   - staging    env watches `main`        → auto-deploys on merge
#   - production env watches `production`   → deploys when the branch is advanced to a v* tag
#                                             (`just deploy-production <tag>`)
# Both Railway services use "Wait for CI", so the green check from this workflow is the
# deploy gate. The verify-release job below additionally blocks any production tip that
# isn't tagged with a vX.Y.Z that matches the workspace version. See docs/deploy.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, production]
  # Weekly advisory-freshness run: `just ci-pds` includes `cargo audit`, which scans
  # Cargo.lock against the RustSec DB — but between pushes an idle repo never re-scans,
  # so a newly published advisory goes unnoticed until the next commit. This is also
  # the re-check cadence for the accepted advisories in .cargo/audit.toml.
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Read-only: this workflow never deploys or touches secrets. Railway pulls and builds the
# Dockerfile out-of-band, so the only thing CI needs is to check out and test the code.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: PDS gate (fmt, clippy, test, audit)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # The changelog gate compares HEAD with the pull request's base commit.
          fetch-depth: 0
          # Read-only gate — never pushes — so don't leave the token in .git/config.
          persist-credentials: false

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      # rust-toolchain.toml pins the exact channel (1.96.0) + rustfmt/clippy, so a bare
      # `rustup toolchain install` provisions everything ci-pds needs. SQLite is bundled
      # (LIBSQLITE3_SYS_USE_PKG_CONFIG stays unset, as in the Dockerfile) — no system libs.
      - name: Rust toolchain
        run: rustup toolchain install --no-self-update

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # cache-bin: false — with the default (true), rust-cache caches ~/.cargo/bin together
          # with .crates2.json and can restore the "cargo-audit is installed" metadata WITHOUT the
          # binary. `cargo binstall` then sees it as present and skips, so `cargo audit` is missing
          # when ci-pds runs it. Keep caching the registry/git/target (the real speedup), not bin.
          cache-bin: false

      - name: Install cargo-audit + cargo-deny
        # Pinned release tag (not @main): a mutable branch ref would let upstream changes
        # land in every CI run with no reviewable version bump.
        uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1
        # cargo-deny is pinned to an exact version: its deny.toml schema shifts across releases, so
        # — like the rust-toolchain pin — a fixed version keeps local and CI from diverging on how
        # deny.toml parses (bump deliberately). cargo-audit tracks latest (it reads only the remote
        # advisory DB, no local schema). `&& … --version` verifies both binaries are actually on
        # PATH, so an install regression fails here with a clear message instead of deep inside
        # `just ci-pds`.
      - run: cargo binstall -y --locked cargo-audit cargo-deny@0.16.4 && cargo audit --version && cargo deny --version

      - name: CI gate (fmt, lock-check, clippy, test, audit, deny)
        env:
          # Empty on push/schedule runs: fragment validity is still checked, while the
          # presence rule is evaluated only for pull requests with a trustworthy base.
          CHANGELOG_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: just ci-pds

      # The stdio MCP conformance suite (tools/mcp/test/conformance.test.ts) needs a built
      # `pds` binary to spawn its hermetic PDS — `just ci-pds` above already produced one at
      # target/debug/pds via `cargo test --workspace` (bin targets are built by `cargo test`
      # by default), so point the suite at it instead of paying for a second `cargo build -p
      # pds`. This is a Rust-only lane otherwise, so node/pnpm are set up here rather than at
      # the top of the job.
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tools/mcp/pnpm-lock.yaml

      - name: Install deps (tools/mcp)
        working-directory: tools/mcp
        run: pnpm install --frozen-lockfile

      - name: Stdio MCP conformance suite (tools/mcp)
        working-directory: tools/mcp
        env:
          CUSTOS_MCP_TEST_PDS_BIN: ${{ github.workspace }}/target/debug/pds
        run: pnpm test

  verify-release:
    name: Verify production tag matches workspace version
    # Production-only backstop. Railway watches the `production` branch; advancing it to a
    # v* tag is the production deploy, so refuse to let a production tip ship unless a
    # vX.Y.Z tag points at it AND equals the version the binary reports
    # (env!("CARGO_PKG_VERSION")). Catches a hand-moved production branch or a stray tag.
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history + tags so `git tag --points-at HEAD` can see the release tag.
          fetch-depth: 0
          # Read-only job — never pushes — so don't leave the token in .git/config.
          persist-credentials: false

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      # cargo (for `cargo metadata`) comes from the pinned toolchain; jq is preinstalled
      # on ubuntu-latest. No build cache needed — this only reads metadata.
      - name: Rust toolchain
        run: rustup toolchain install --no-self-update

      - name: Verify release tag matches workspace version
        run: just verify-release-tag
