---
when:
  - event: ["push", "pull_request", "manual"]
    branch: ["main"]

engine: nixery

dependencies:
  nixpkgs:
    - rustc
    - cargo
    - clippy
    - rustfmt
    - sqlite

steps:
  - name: Check formatting
    run: cargo fmt --all --check
  - name: Clippy
    run: cargo clippy --workspace -- -D warnings
  - name: Test
    run: cargo test --workspace
  - name: Audit
    run: cargo audit
