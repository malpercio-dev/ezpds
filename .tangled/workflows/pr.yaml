when:
  - event: ["pull_request"]
    branch: ["main"]

engine: nixery

dependencies:
  nixpkgs:
    - rustc
    - cargo
    - clippy
    - rustfmt
    - sqlite
    - gcc
    - binutils
    - pkg-config
    - just
    - cargo-audit

steps:
  - name: CI (fmt, clippy, test, audit)
    command: just ci-pds
