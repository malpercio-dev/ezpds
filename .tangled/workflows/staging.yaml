when:
  - event: ["push", "manual"]
    branch: ["main"]

engine: nixery

dependencies:
  nixpkgs:
    - rustc
    - cargo
    - clippy
    - rustfmt
    - sqlite
    - gcc
    - binutils
    - pkg-config
    - just
    - cargo-audit
    - railway
    - jq
    - coreutils

steps:
  - name: CI (fmt, clippy, test, audit)
    command: just ci-relay
  - name: Deploy to staging
    command: RAILWAY_TOKEN="$RAILWAY_TOKEN_STAGING" railway up --service ezpds --environment staging --ci
  - name: Verify staging deploy healthy
    command: RAILWAY_TOKEN="$RAILWAY_TOKEN_STAGING" sh scripts/ci/railway-wait-healthy.sh
