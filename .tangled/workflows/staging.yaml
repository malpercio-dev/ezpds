when:
  - event: ["push", "manual"]
    branch: ["main"]

engine: nixery

dependencies:
  nixpkgs:
    - rustc
    - cargo
    - clippy
    - rustfmt
    - sqlite
    - gcc
    - binutils
    - pkg-config
    - just
    - cargo-audit
    - railway
    - jq
    - coreutils

steps:
  - name: CI (fmt, clippy, test, audit)
    command: just ci-pds
  - name: Deploy to staging (deploy + health, with retries)
    command: RAILWAY_TOKEN="$RAILWAY_TOKEN_STAGING" sh scripts/ci/railway-deploy.sh staging
