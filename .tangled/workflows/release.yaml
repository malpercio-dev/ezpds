when:
  - event: ["push", "manual"]
    tag: ["v*"]

engine: nixery

dependencies:
  nixpkgs:
    - rustc
    - cargo
    - clippy
    - rustfmt
    - sqlite
    - gcc
    - binutils
    - pkg-config
    - just
    - cargo-audit
    - railway
    - jq
    - coreutils

steps:
  # Backstop for the `just release` recipe: refuse to ship a tag whose version doesn't match
  # the workspace version the binary will report (env!("CARGO_PKG_VERSION")). Catches a
  # hand-pushed tag that skipped `just set-version`. cargo + jq are both in the deps above.
  - name: Verify release tag matches workspace version
    command: |
      # Check EVERY semver v-tag on HEAD, not just the first — a release HEAD must not carry
      # any tag whose version disagrees with what the binary reports.
      tags="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)"
      version="v$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="pds") | .version')"
      if [ -z "$tags" ]; then
        echo "⚠ no vX.Y.Z tag points at HEAD; skipping tag/version check" >&2
        exit 0
      fi
      mismatched="$(printf '%s\n' "$tags" | grep -vxF "$version" || true)"
      if [ -n "$mismatched" ]; then
        echo "✗ release tag(s) do not match workspace version '$version' (Cargo.toml):" >&2
        printf '    %s\n' "$mismatched" >&2
        echo "  Bump [workspace.package].version to match (just set-version ${version#v}) and re-tag." >&2
        exit 1
      fi
      echo "✓ all vX.Y.Z tag(s) on HEAD match workspace version '$version'"
  - name: CI (fmt, clippy, test, audit)
    command: just ci-pds
  - name: Promote to production (deploy + health, with retries)
    command: RAILWAY_TOKEN="$RAILWAY_TOKEN_PRODUCTION" sh scripts/ci/railway-deploy.sh production
