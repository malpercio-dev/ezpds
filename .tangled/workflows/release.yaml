when:
  - event: ["push"]
    tag: ["v*"]

engine: nixery

dependencies:
  nixpkgs:
    - rustc
    - cargo
    - clippy
    - rustfmt
    - sqlite
    - just
    - cargo-audit
    - railway
    - jq
    - coreutils

steps:
  - name: CI (fmt, clippy, test, audit)
    command: just ci
  - name: Promote to production
    command: RAILWAY_TOKEN="$RAILWAY_TOKEN_PRODUCTION" railway up --service ezpds --environment production --ci
  - name: Verify production deploy healthy
    command: RAILWAY_TOKEN="$RAILWAY_TOKEN_PRODUCTION" sh scripts/ci/railway-wait-healthy.sh
