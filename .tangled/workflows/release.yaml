when:
  - event: ["push"]
    tag: ["v*"]

engine: nixery

dependencies:
  nixpkgs:
    - rustc
    - cargo
    - clippy
    - rustfmt
    - sqlite
    - just
    - cargo-audit

steps:
  - name: CI (fmt, clippy, test, audit)
    run: just ci
  - name: Promote to production (wired in Phase 5)
    run: echo "production promote added in Phase 5"
