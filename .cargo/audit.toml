# cargo-audit policy ‚Äî read automatically by `cargo audit` (RustSec advisory scan).
#
# Every entry in `ignore` is an accepted risk and MUST carry a rationale below. An
# advisory with no fix and no rationale does not belong here ‚Äî fix or remove the
# dependency instead. Revisit accepted advisories whenever a fixed release ships.
#
# Re-check cadence: CI runs `cargo audit` on every PR/push AND on a weekly schedule
# (.github/workflows/ci.yml `schedule:`), so new advisories surface within a week even
# when the repo is idle. When the weekly run goes red, re-read the rationales below ‚Äî
# an ignored advisory whose blocking condition has cleared (e.g. `plist` bumping its
# quick-xml requirement) must be un-ignored, not left to rot.
#
# RUSTSEC-2023-0071 ‚Äî "Marvin Attack" timing side-channel in `rsa`. No fixed release
#   exists upstream. `rsa` is pulled in only transitively by sqlx-macros' compile-time
#   MySQL backend; the pds is sqlite-only, so `rsa` is never exercised at runtime.
#   Revisit when a fixed `rsa` release is published.
#
# RUSTSEC-2026-0194 / RUSTSEC-2026-0195 ‚Äî quadratic runtime / unbounded namespace-
#   allocation DoS in `quick-xml`'s `NsReader`. No reachable fixed release yet: `plist`
#   (the only consumer in this tree) requires `quick-xml ^0.39.2` even at its newest
#   release (1.9.0), which is below the fixed `>=0.41.0`. `plist` itself is pulled in
#   only by `netdev`/`netwatch`/`iroh` (macOS-only network-interface enumeration) and by
#   `tauri` (the iOS app shells) ‚Äî neither is part of the deployed Linux PDS binary.
#   Revisit when `plist` bumps its `quick-xml` requirement.
#
# RUSTSEC-2024-0429 ‚Äî unsoundness in `glib` 0.18's `VariantStrIter` iterator impls. The only
#   consumer is the gtk-rs 0.18 stack (`glib` ‚Üê `atk`/`gdk`/`gtk` ‚Üê `muda`/`tao` ‚Üê `tauri`), which
#   is pulled in exclusively by the `identity-wallet` / `admin-companion` Tauri desktop shells ‚Äî
#   never by the deployed Linux PDS binary. A fixed `glib` lives in the 0.19/0.20 line, which is a
#   whole-tauri-stack bump outside this repo's control (tauri v2 pins gtk 0.18). Revisit when
#   tauri's transitive gtk-rs requirement advances.
#
# RUSTSEC-2026-0097 ‚Äî unsoundness in `rand` when a custom logger re-enters `rand::rng()`. The
#   runtime `rand` copies used by the PDS/workspace are on patched releases (0.8.6 / 0.9.3 / 0.10.1).
#   One unpatched copy remains ‚Äî `rand 0.7.3` ‚Äî and there is no patched 0.7.x release (fixes start at
#   0.8.6). That copy is a *build-time* transitive of the Tauri toolchain only
#   (`rand 0.7.3` ‚Üê `phf_generator 0.8` ‚Üê `phf_codegen` ‚Üê `selectors` ‚Üê `kuchikiki` ‚Üê
#   `tauri-utils` build-deps), so it never ships in any binary and the reentrant-logger trigger is
#   not reachable. Revisit when the tauri build stack drops `rand 0.7`.

[advisories]
ignore = [
    "RUSTSEC-2023-0071",
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    "RUSTSEC-2024-0429",
    "RUSTSEC-2026-0097",
]
