# copy .env.local.example → .env.local before running
services:
  pds:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ezpds-pds
    ports:
      - "8080:8080"
    volumes:
      - ezpds-data:/data
    env_file: .env.local
    environment:
      - PORT=8080

volumes:
  ezpds-data:
