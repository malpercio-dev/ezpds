# Railway config for the static documentation-site service.
#
# Used only when the service's Root Directory is set to `sites/docs` (so Railway
# resolves config + Dockerfile from here, not the repo root). Keeps this service
# independent of the repo-root railway.toml, which builds the PDS. Mirrors the
# marketing-site service (sites/marketing/railway.toml).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Caddy serves the site root; a 200 there means the service is up.
healthcheckPath = "/"
healthcheckTimeout = 30
