<!doctype html>
<!--
  Source for assets/og/obsign.png (1200x630 social card). Regenerate: ./render.sh
  (headless Chrome renders at 1200x717 and crops to 630 — see render.sh for why).
  Colours + fonts are the "Sealed Credential" register, forked from site.css.
  Blocks are placed with absolute `top` so headless layout is deterministic.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face { font-family: 'Public Sans'; font-weight: 600; src: url('../fonts/PublicSans-SemiBold.woff2') format('woff2'); }
      @font-face { font-family: 'Public Sans'; font-weight: 700; src: url('../fonts/PublicSans-Bold.woff2') format('woff2'); }
      @font-face { font-family: 'Public Sans'; font-weight: 400; src: url('../fonts/PublicSans-Regular.woff2') format('woff2'); }
      @font-face { font-family: 'Libre Caslon Display'; font-weight: 400; src: url('../fonts/LibreCaslonDisplay-Regular.ttf') format('truetype'); }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      /* Fixed 1200x630 canvas: every block is absolutely placed by `top` so the
         headless screenshot (which mis-handles bottom-anchored / space-between
         layout) captures the whole card deterministically. */
      body {
        background: oklch(1 0 0);
        color: oklch(0.23 0.012 60);
        font-family: 'Public Sans', system-ui, sans-serif;
        position: relative;
        overflow: hidden;
      }
      .seal-sprite { position: absolute; width: 0; height: 0; }
      /* Embossed wax-seal watermark, oversized and bleeding off the right edge. */
      .watermark {
        position: absolute;
        right: -160px;
        top: 50%;
        transform: translateY(-50%);
        width: 640px;
        height: 640px;
        opacity: 0.06;
      }
      .watermark svg { width: 100%; height: 100%; display: block; }
      .lockup {
        position: absolute; top: 64px; left: 80px;
        display: flex; align-items: center; gap: 18px;
      }
      .seal { width: 60px; height: 60px; display: flex; flex-shrink: 0; }
      .seal svg { width: 100%; height: 100%; display: block; }
      .wordmark { font-weight: 700; font-size: 32px; letter-spacing: -0.01em; }
      .hero { position: absolute; top: 200px; left: 80px; max-width: 820px; }
      h1 {
        font-family: 'Libre Caslon Display', Georgia, serif;
        font-weight: 400; font-size: 76px; line-height: 1.06;
        letter-spacing: -0.005em; text-wrap: balance; margin-bottom: 24px;
      }
      .sub { font-size: 26px; line-height: 1.45; color: oklch(0.31 0.012 60); max-width: 800px; }
      .foot {
        position: absolute; top: 550px; left: 80px; right: 80px;
        display: flex; justify-content: space-between; align-items: baseline;
      }
      .domain { font-weight: 600; font-size: 22px; color: oklch(0.42 0.012 60); }
      .tag { font-size: 20px; color: oklch(0.42 0.012 60); }
    </style>
  </head>
