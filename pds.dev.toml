# Local development configuration for `devenv up`
#
# Required fields (data_dir, public_url) are injected via EZPDS_* environment
# variables set in devenv.nix.  Override them per-machine in devenv.local.nix:
#
#   { ... }: {
#     env.EZPDS_PUBLIC_URL = "https://my-tunnel.ngrok.io";
#   }
#
#

# these would be silly values for a production deployment
# don't use them in production
admin_token = "test-token-please-ignore"

# TODO: fill in your preferred bind address and port for local development
bind_address = "127.0.0.1"
port = 8080
database_url = ":memory:"

# Required: at least one handle domain your PDS serves (e.g. ["your.domain"])
available_user_domains = ["localhost"]
invite_code_required = true

# Optional: human-readable display name for this instance, surfaced to end users (e.g. the
# `resource_name` field of the OAuth protected-resource metadata). Defaults to "ezpds".
# Override with EZPDS_SERVICE_NAME.
# service_name = "ezpds"

# Optional: set to your server's DID once generated in Wave 3
# server_did = "did:plc:..."

# Optional: legal links
# [links]
# privacy_policy = "https://example.com/privacy"
# terms_of_service = "https://example.com/tos"

# Optional: admin contact
# [contact]
# email = "admin@example.com"

# AppView proxy for app.bsky.* methods the PDS doesn't handle locally (feeds, notifications,
# search). Defaults to the public Bluesky AppView, so local dev gets real feed data out of the
# box. Override with EZPDS_APPVIEW_URL / EZPDS_APPVIEW_DID to point at your own AppView.
# [appview]
# url = "https://api.bsky.app"
# did = "did:web:api.bsky.app#bsky_appview"

# Crawler (relay/BGS) notifications via com.atproto.sync.requestCrawl.
# After each repo commit the relay POSTs to each <url>/xrpc/com.atproto.sync.requestCrawl
# so the crawler pulls new content promptly. Defaults to ["https://bsky.network"] in
# production; disabled here so local development never pings the public network.
# Override with EZPDS_CRAWLERS (comma-separated URLs; empty disables).
[crawlers]
urls = []

# Request rate limiting (reference-parity). Enabled by default with the reference PDS values
# shown below; a knob of 0 disables that specific limiter. Every field is overridable via
# EZPDS_RATE_LIMIT_* (e.g. EZPDS_RATE_LIMIT_ENABLED=false to turn the whole subsystem off).
# [rate_limit]
# enabled = true
# global_ip_per_5min = 3000      # all requests, per client IP (sync.getRepo/subscribeRepos/_health exempt)
# create_account_per_5min = 100  # per IP
# create_session_per_5min = 30   # per IP
# reset_password_per_5min = 50   # per IP
# update_handle_per_5min = 10    # per IP
# write_points_hourly = 5000     # per account (create=3, update=2, delete=1)
# write_points_daily = 35000     # per account
